<div class="flex flex-col items-center gap-2 p-2">
  <h2 class="text-white text-lg font-semibold">{{ player.name }}'s Build</h2>
  <app-character-details [player]="player" [combat]="true" [enemy]="true"
    [showStats]="showStats" [redacted]="redacted" [initialExpanded]="true"
    [talentClasses]="talentClasses" [itemClasses]="itemClasses"></app-character-details>
  @if (!redacted) {
    <app-skill-icons [player]="player"></app-skill-icons>
  }
</div>
