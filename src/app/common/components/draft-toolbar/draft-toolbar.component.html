<mat-toolbar class="w-screen fixed top-0 z-10">
  <div class="toolbar-grid">
    <div class="toolbar-col-start flex justify-between gap-1 sm:gap-4 items-center">
      <span class="text-sm sm:text-lg text-center shrink-0 cursor-default" [appInfoHint]="goldHint">
        <span class="hidden sm:inline"></span>{{ player.gold }} 🟡
        <span class="text-yellow-400">+{{ player.income | number:'1.0-0' }} 💰</span></span>
    </div>

    <div class="toolbar-col-center">
      @if (!isFighting() && ((availableTalents?.length ?? 0) > 0 || levelUpPending())) {
      <button mat-button class="level-up-toggle"
        (click)="toggleTalentPicker()" [appInfoHint]="talentHint"
        [class.ring-2]="showTalentPicker()"
        [class.ring-yellow-400]="showTalentPicker()">
        <span class="level-up-toggle-label">Level up</span>
        <mat-icon [class.animate-bounce]="!showTalentPicker() && (availableTalents?.length ?? 0) > 0">
          {{ showTalentPicker() ? 'keyboard_arrow_down' : 'keyboard_arrow_up' }}
        </mat-icon>
      </button>
      }
    </div>

    <div class="toolbar-col-end flex items-center">
      <button mat-icon-button (click)="toggleInfoBox()" [appInfoHint]="infoBoxHint"
        [class.text-amber-400]="infoBoxHighlighted()"
        [class.text-gray-400]="!infoBoxHighlighted()"
        [class.ring-1]="infoBoxHighlighted()"
        [class.ring-amber-400]="infoBoxHighlighted()"
        [class.rounded-full]="infoBoxHighlighted()">
        <mat-icon>{{ infoBoxHighlighted() ? 'help' : 'help_outline' }}</mat-icon>
      </button>

      <button mat-icon-button (click)="openEncyclopedia()" [appInfoHint]="encyclopediaHint" [gatesAction]="true">
        <mat-icon>menu_book</mat-icon>
      </button>

      <button mat-icon-button (click)="cycleVolume()" [appInfoHint]="volumeHint">
        <mat-icon>{{ volumeIcon }}</mat-icon>
      </button>

      <button mat-icon-button (click)="openReplays()" [appInfoHint]="matchHistoryHint">
        <mat-icon>history</mat-icon>
      </button>

      <button mat-icon-button class="abandon-run-btn" (click)="confirmAbandon()" [appInfoHint]="abandonHint">
        <mat-icon>flag</mat-icon>
      </button>

      @if (isFighting()) {
        <button mat-icon-button class="forfeit-fight-btn" (click)="confirmForfeit()" [appInfoHint]="forfeitHint">
          <mat-icon>exit_to_app</mat-icon>
        </button>
      }

      @if (enemyPickerEnabled && !isFighting()) {
        <app-next-fight-picker></app-next-fight-picker>
      }
    </div>
  </div>

  @if(!isFighting()) {
  <div class="fixed top-1/2 -translate-y-1/2 right-1 sm:right-2 flex flex-col scale-[1.125] sm:scale-[1.35] md:scale-[1.65] origin-right">

    <button [disabled]="canLevelUp ? player.gold < goldToLevelUp : player.gold < 4"
      [appInfoHint]="xpButtonHint" [gatesAction]="true"
      mat-button class="chungus-icon-btn m-1 sm:m-2"
      [ngClass]="{'level-up-btn': canLevelUp}"
      (click)="canLevelUp ? levelUp() : buyXp()"
      (mouseenter)="switchBuyXpAnimate()" (mouseleave)="switchBuyXpAnimate()">
      <mat-icon [ngClass]="{'animate-bounce': hoverBuyXp}">{{ canLevelUp ? 'arrow_upward' : 'keyboard_arrow_up' }}</mat-icon>
    </button>

    <button [disabled]="player.gold < player.refreshShopCost" [appInfoHint]="refreshShopHint" [gatesAction]="true"
      mat-button class="chungus-icon-btn m-1 sm:m-2" (click)="refreshShop()" (mouseenter)="switchShopRefreshAnimate()"
      (mouseleave)="switchShopRefreshAnimate()">
      <mat-icon [ngClass]="{'animate-spin': hoverShopRefresh}">refresh</mat-icon>
    </button>
    @if(isLocked){
    <button [appInfoHint]="lockShopHint" [gatesAction]="true" mat-button class="chungus-icon-btn m-1 sm:m-2"
      [ngClass]="{'clicked' : isLocked}" (click)="lockShop()"><mat-icon>lock_outline</mat-icon>
    </button>} @else {
      <button [appInfoHint]="lockShopHint" [gatesAction]="true" mat-button class="chungus-icon-btn m-1 sm:m-2"
      [ngClass]="{'clicked' : isLocked}" (click)="lockShop()"><mat-icon>lock_open</mat-icon>
    </button>}
  </div>
  }

</mat-toolbar>
@if (!isFighting()) {
<div appDraggablePanel [dragHandleSelector]="'.cd-header'" class="fixed z-10 top-16 left-0 max-w-fit">
  <app-character-details [player]="player" [combat]="false">
  </app-character-details>
</div>
}
