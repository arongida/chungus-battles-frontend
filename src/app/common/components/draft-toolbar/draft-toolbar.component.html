<mat-toolbar class="w-screen fixed top-0 z-10">
  <div class="flex justify-between gap-1 sm:gap-4 items-center">
    <img class="w-10 h-10 sm:w-12 sm:h-12 rounded-full object-cover hover:border-white hover:border shrink-0"
      [ngClass]="{'border': showCharacterDetails()}" src="{{player.avatarUrl.replace('01','transparent')}}" alt="player"
      (click)="switchCharacterDetails()">
    <span class="text-center text-sm max-w-16 truncate sm:max-w-none sm:text-base">{{player.name}}</span>
    <span class="text-xs sm:text-sm text-center shrink-0 cursor-default" [appInfoHint]="goldHint">
      <span class="hidden sm:inline">Gold: </span>{{ player.gold }} 🟡</span>

    @if (this.availableTalents && this.availableTalents.length > 0) {

    <button mat-mini-fab (click)="toggleTalentPicker()" [appInfoHint]="talentHint"
      [class.ring-2]="showTalentPicker()" [class.ring-yellow-400]="showTalentPicker()">
      <mat-icon class="animate-bounce">keyboard_arrow_up</mat-icon>
    </button>

    }

  </div>
  <span class="flex-auto">
    <div class="flex flex-col gap-1 w-1/4 sm:w-1/3 mx-auto">
      <div class="flex justify-between">
        <label class="text-xs text-center" for="xp"><span class="hidden sm:inline">XP: </span>{{ player.xp }}/{{ player.maxXp }}</label>
        <label class="text-xs text-center" for="xp"><span class="hidden sm:inline">Level: </span>{{ player.level }}</label>
      </div>
      <mat-progress-bar id="xp" mode="determinate" value="{{ (player.xp / player.maxXp) * 100 }}"></mat-progress-bar>
    </div>
  </span>

  <button mat-icon-button (click)="toggleInfoBox()"
    [class.text-amber-400]="infoBoxService.isVisible()"
    [class.text-gray-400]="!infoBoxService.isVisible()"
    [class.ring-1]="infoBoxService.isVisible()"
    [class.ring-amber-400]="infoBoxService.isVisible()"
    [class.rounded-full]="infoBoxService.isVisible()">
    <mat-icon>{{ infoBoxService.isVisible() ? 'help' : 'help_outline' }}</mat-icon>
  </button>

  <button mat-icon-button matBadge="{{player.inventory.length}}" (click)="openInventory()">
    <mat-icon>menu_book</mat-icon>
  </button>

  <button mat-icon-button (click)="switchMute()">
    @if(muted) {<mat-icon>volume_off</mat-icon>}
    @else {<mat-icon>volume_up</mat-icon>}
  </button>

  @if(!isFighting()) {
  <div class="fixed top-16 right-1 sm:top-20 sm:right-2 flex flex-col scale-75 sm:scale-90 md:scale-100 origin-top-right">

    <button [disabled]="player.gold < 4 || player.level > 4 " [appInfoHint]="buyXpHint"
      mat-mini-fab color="text-white" class="m-1 sm:m-2" (click)="buyXp()"
      (mouseenter)="switchBuyXpAnimate()" (mouseleave)="switchBuyXpAnimate()">
      <mat-icon [ngClass]="{'animate-bounce': hoverBuyXp}">keyboard_arrow_up</mat-icon>
    </button>

    <button [disabled]="player.gold < player.refreshShopCost" [appInfoHint]="refreshShopHint"
      mat-mini-fab color="text-white"
      class="m-1 sm:m-2" (click)="refreshShop()" (mouseenter)="switchShopRefreshAnimate()"
      (mouseleave)="switchShopRefreshAnimate()">
      <mat-icon [ngClass]="{'animate-spin': hoverShopRefresh}">refresh</mat-icon>
    </button>
    @if(isLocked){
    <button [appInfoHint]="lockShopHint" mat-mini-fab color="text-white"
      class="m-1 sm:m-2" [ngClass]="{'clicked' : isLocked}" (click)="lockShop()"><mat-icon>lock_outline</mat-icon>
    </button>} @else {
      <button [appInfoHint]="lockShopHint" mat-mini-fab color="text-white"
      class="m-1 sm:m-2" [ngClass]="{'clicked' : isLocked}" (click)="lockShop()"><mat-icon>lock_open</mat-icon>
    </button>}
  </div>
  }

</mat-toolbar>
@if (showCharacterDetails()) {
<app-character-details [player]="player" [combat]="isFighting()" class="relative max-w-fit top-16 z-10">
</app-character-details>
}

@if (showTalentPicker() && availableTalents && availableTalents.length > 0) {
<app-talents
  [talentsList]="availableTalents"
  (panelClosed)="closeTalentPicker()"
  (talentChosen)="closeTalentPicker()">
</app-talents>
}
