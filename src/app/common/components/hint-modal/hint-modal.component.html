<div class="hint-modal">
  <app-info-card [content]="content"></app-info-card>
  <div class="hint-modal-footer" [class.hint-modal-footer--end]="!showRemember">
    @if (showRemember) {
      <mat-checkbox
        class="dont-show-again"
        [checked]="dontShowAgain()"
        (change)="onDontShowAgainChange($event)"
      >
        Don't show again
      </mat-checkbox>
    }
    <button mat-raised-button color="primary" class="ok-button" (click)="ok()">OK</button>
  </div>
</div>
