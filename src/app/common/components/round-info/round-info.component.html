<div id="round-info" class="text-white">
  <div class="hud-card cursor-default" [appInfoHint]="roundInfoHint">
    <div class="hud-row">
      <span class="hud-label">Round</span>
      <span class="hud-value round-value">{{ player.round }}</span>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-row">
      <span class="hud-label">Lives</span>
      <span class="hud-lives">{{ getLivesString() }}</span>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-row">
      <span class="hud-label">Wins</span>
      <span class="hud-value wins-value">{{ getPlayerWins() }}</span>
    </div>
  </div>
</div>
