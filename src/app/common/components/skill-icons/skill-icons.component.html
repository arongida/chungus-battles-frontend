<div class="pl-1 sm:pl-4">
  <div class="text-white flex flex-row fill-slate-100">
    @for (talent of player.talents; track $index) {
    <div class="p-1 rounded-sm cursor-default" [appTalentHoverCard]="talent"
      id="talent-{{talent.talentId}}-{{player.playerId}}">
      <img [src]="talent.image" class="w-7 h-7 sm:w-10 sm:h-10 object-contain" />
    </div>
    }
  </div>
</div>
