<!-- Draft-log floating-text layer; messages rise from the bottom of the screen. -->
<div id="draft-log-floats" class="fixed bottom-0 left-0 right-0 pointer-events-none z-[9998]" style="height: 60vh"></div>

<app-draft-toolbar class="fixed top-0 z-10" [player]="player()!"
  [availableTalents]="availableTalents()!"></app-draft-toolbar>


<div class="flex flex-col justify-center items-center z-0 game-bg w-screen h-screen">

  <app-shop class="max-h-screen max-w-screen" [shop]="shop()" [player]="player()!"></app-shop>

</div>

<app-round-info [player]="player()!"></app-round-info>

<app-ready-button [availableTalents]="availableTalents()" [player]="player()!"
  [nextEnemy]="nextEnemy()" [nextEnemyRevealLevel]="nextEnemyRevealLevel()"
  [nextEnemyTalentClasses]="nextEnemyTalentClasses()" [nextEnemyItemClasses]="nextEnemyItemClasses()" />
