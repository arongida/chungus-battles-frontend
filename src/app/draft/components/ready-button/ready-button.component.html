<div class="fixed-button">
  <app-next-enemy-badge [enemy]="nextEnemy" [revealLevel]="nextEnemyRevealLevel"
    [talentClasses]="nextEnemyTalentClasses" [itemClasses]="nextEnemyItemClasses"></app-next-enemy-badge>
  <button [disabled]="loading || availableTalents.length > 0" mat-raised-button class="chungus-modal-btn" (click)="startFight()"
    #avatarTooltip="matTooltip" matTooltip="You have unequipped items!" matTooltipPosition="above"
    [matTooltipDisabled]="!shouldShowEquipmentWarning()">
    @if (loading) {
    <mat-spinner diameter="24"></mat-spinner>
    } @else if (availableTalents.length > 0) {
    Please select a talent!
    }
    @else {
    Ready to Chungus!
    }
  </button>
</div>
