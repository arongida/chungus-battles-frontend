<div class="cl-panel" [class.cl-panel--collapsed]="collapsed()">
  @if (!collapsed()) {
    <div class="cl-scroll" #scroll>
      @for (entry of entries; track $index) {
        <div class="cl-row" [class]="'cl-row--' + entry.kind"
             [appCombatLogHoverCard]="entry"
             [hoverPlayer]="player"
             [hoverEnemy]="enemy">
          {{ entry.text }}
        </div>
      }
    </div>
    <div class="cl-divider"></div>
  }
  <div class="cl-header" (click)="collapsed.update(v => !v)">
    <span>⚔️ Combat Log</span>
    <button class="cl-toggle" (click)="collapsed.update(v => !v); $event.stopPropagation()"
            [title]="collapsed() ? 'Show log' : 'Hide log'">
      {{ collapsed() ? '▲' : '▼' }}
    </button>
  </div>
</div>
