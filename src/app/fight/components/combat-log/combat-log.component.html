<div class="cl-panel">
  <div class="cl-header">⚔️ Combat Log</div>
  <div class="cl-divider"></div>
  <div class="cl-scroll" #scroll>
    @for (entry of entries; track $index) {
      <div class="cl-row" [class]="'cl-row--' + entry.kind"
           [appCombatLogHoverCard]="entry"
           [hoverPlayer]="player"
           [hoverEnemy]="enemy">
        {{ entry.text }}
      </div>
    }
  </div>
</div>
