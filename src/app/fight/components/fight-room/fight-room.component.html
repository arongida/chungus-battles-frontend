@if (player) {
<app-draft-toolbar class="fixed w-screen top-0 z-10" [player]="player"></app-draft-toolbar>
}



<div class="w-screen h-screen bg-amber-950 bg-cover overflow-hidden
  bg-[url('https://chungus-battles.b-cdn.net/chungus-battles-assets/BG_01.png')]">


    @if (enemy) {
      <div class="fixed top-16 flex items-center justify-center w-screen mt-6 overflow-x-hidden">
        <div id="enemy"
             class="flex justify-center items-center bg-amber-900 bg-opacity-20 pb-5">
          <div class="relative">
            <app-character-details [combat]="true"
                                   [player]="enemy"
                                   [enemy]="true"
                                   [playerBeingHit]="playerBeingHit"
                                   [enemyBeingHit]="enemyBeingHit"
                                   class="min-w-fit max-w-fit"></app-character-details>

            <app-skill-icons class="px-2 z-10"
                             [player]="enemy"></app-skill-icons>

          </div>
        </div>
      </div>
    }


    @if (player) {
      <div class="fixed bottom-2 flex items-center justify-center w-screen mb-4 overflow-x-hidden">
        <div id="character"
             class="flex justify-center items-center bg-amber-900 bg-opacity-20">
          <div class="relative">
            <app-skill-icons class="px-2 z-10"
                             [player]="player"></app-skill-icons>
            <app-character-details [combat]="true"
                                   [player]="player"
                                   [playerBeingHit]="playerBeingHit"
                                   [enemyBeingHit]="enemyBeingHit"
                                   class="min-w-fit max-w-fit"></app-character-details>
          </div>
        </div>
      </div>
    }



</div>


@if (player) {
<app-round-info [player]="player"></app-round-info>
}

<!-- Combat log toggle button (mobile only) -->
<button mat-mini-fab class="fixed bottom-16 right-1 z-50 md:hidden" (click)="showCombatLog = !showCombatLog">
  <mat-icon>{{ showCombatLog ? 'close' : 'article' }}</mat-icon>
</button>

<!-- Combat log: always visible on md+, toggle-controlled on mobile -->
<div class="justify-center fixed bottom-1 right-1 scale-75 lg:scale-100 z-40 hidden md:flex"
     [style.display]="showCombatLog ? 'flex' : ''">
  <app-combat-log [combatLog]="combatLog"></app-combat-log>
</div>
